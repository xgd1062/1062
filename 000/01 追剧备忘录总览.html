<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追番进度管理 - 自动登录版</title>

    <style>
        :root {
            --primary-color: #f67b8d;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-light: #f4f7f9;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --watching-color: #f67b8d;
            --update-color: #ffc107;
            --today-bg: #fffbf0;
            --auto-predict-color: #ff5722;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei';
        }

        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-light);
            color: #333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, var(--watching-color) 0%, #ffc0cb 100%);
            padding: 20px 30px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .header h1 {
            margin: 0;
            font-size: 1.8em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-display {
            text-align: right;
            font-size: 0.85em;
            opacity: 0.9;
        }

        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            background-color: white;
            color: var(--watching-color);
            font-weight: bold;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .day-group {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 2px solid transparent;
        }

        .day-group.is-today {
            border-color: var(--watching-color);
            background-color: var(--today-bg);
        }

        .day-group h3 {
            margin-top: 0;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ffedf0;
            display: flex;
            align-items: center;
        }

        .day-label {
            font-size: 1.1em;
            color: var(--watching-color);
        }

        .relative-tag {
            margin-left: 12px;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 4px;
            background: #eee;
            color: #666;
            font-weight: normal;
        }

        .is-today .relative-tag {
            background: var(--watching-color);
            color: white;
            font-weight: bold;
        }

        .anime-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .anime-item {
            width: 154px;
            padding: 10px;
            background-color: var(--card-bg);
            border: 1px solid #dee2e6;
            border-left: 4px solid var(--watching-color);
            border-radius: 6px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .anime-content h4 {
            margin: 0 0 5px 0;
            font-size: 0.95em;
            overflow: hidden;
        }

        .anime-content h4 a {
            color: #495057;
            text-decoration: none;
            display: block;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .progress-info {
            font-size: 0.75em;
            color: var(--secondary-color);
            margin-bottom: 5px;
            line-height: 1.5;
        }

        .updated-episode-display {
            color: var(--update-color);
            font-weight: bold;
        }

        .is-predicted {
            color: var(--auto-predict-color) !important;
            text-decoration: underline dotted;
        }

        .user-episode-display {
            color: #007bff;
            font-weight: bold;
        }

        .progress-bar {
            height: 5px;
            margin-bottom: 8px;
            background-color: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--watching-color);
            transition: width 0.4s ease;
        }

        .anime-actions {
            display: flex;
            gap: 3px;
            border-top: 1px dashed #eee;
            padding-top: 8px;
        }

        .anime-actions button {
            flex: 1;
            padding: 4px 0;
            font-size: 0.7em;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            color: white;
        }

        .plus-one-btn {
            background-color: var(--success-color);
        }

        .edit-btn {
            background-color: var(--secondary-color);
        }

        .delete-btn {
            background-color: var(--danger-color);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.85em;
            margin-bottom: 4px;
            color: #666;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--watching-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #sync-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 0.85em;
            display: none;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>🍿 追番进度管理</h1>
        <div class="header-right">
            <div class="time-display" id="current-time"></div>
            <button id="pushBtn" class="action-btn" style="background-color: #2196f3; color: white;">同步并重置基准</button>
            <button id="addAnimeBtn" class="action-btn">新增</button>
            <button id="configBtn" class="action-btn" title="配置">⚙️</button>
        </div>
    </header>

    <main id="overview-container"></main>
    <div id="sync-status"></div>

    <div id="configModal" class="modal">
        <div class="modal-content">
            <h3>GitHub 配置</h3>
            <div class="form-group"><label>Access Token (持久化缓存):</label><input type="password" id="gh_token"></div>
            <button class="btn-submit" onclick="saveConfig()">连接并保存</button>
            <button class="btn-submit" style="background:#6c757d; margin-top:8px;"
                onclick="closeModal('configModal')">取消</button>
        </div>
    </div>

    <div id="animeModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">编辑番剧</h3>
            <form id="animeForm">
                <div class="form-group"><label>名称:</label><input type="text" id="f_name" required></div>
                <div class="form-group"><label>链接:</label><input type="url" id="f_url"></div>
                <div class="form-group"><label>基准已更新集数:</label><input type="number" id="f_cur" required></div>
                <div class="form-group"><label>我的进度:</label><input type="number" id="f_my" required></div>
                <div class="form-group"><label>总集数:</label><input type="number" id="f_total"></div>
                <div class="form-group">
                    <label>更新日:</label>
                    <select id="f_day">
                        <option value="周一">周一</option>
                        <option value="周二">周二</option>
                        <option value="周三">周三</option>
                        <option value="周四">周四</option>
                        <option value="周五">周五</option>
                        <option value="周六">周六</option>
                        <option value="周日">周日</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">暂存修改</button>
                <button type="button" class="btn-submit" style="background:#6c757d; margin-top:8px;"
                    onclick="closeModal('animeModal')">取消</button>
            </form>
        </div>
    </div>

    <script>
        const CONFIG = {
            REPO: { owner: 'xgd1062', repo: '1062', path: '000/01番剧更新信息.json' },
            WEEK_MAP: ['周日', '周一', '周二', '周三', '周四', '周五', '周六'],
            WEEK_REVERSE: { '周日': 0, '周一': 1, '周二': 2, '周三': 3, '周四': 4, '周五': 5, '周六': 6 }
        };

        let state = {
            data: [],
            // 修改点：从 localStorage 读取，实现持久化
            token: localStorage.getItem('gh_token') || '',
            sha: null,
            baseTime: null,
            editIdx: null
        };

        window.onload = () => {
            updateTime();
            setInterval(updateTime, 1000);

            // 如果缓存里有 Token，直接拉取数据
            if (state.token) {
                document.getElementById('gh_token').value = state.token;
                pullCloud();
            } else {
                openModal('configModal');
            }
        };

        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleString();
        }

        // 推算逻辑（纯日期差）
        function calculateCurrentUpdate(item) {
            if (!state.baseTime) return { value: item.current_update, isChanged: false };
            const now = new Date();
            const nowDateOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const base = new Date(state.baseTime);
            const baseDateOnly = new Date(base.getFullYear(), base.getMonth(), base.getDate());

            const diffDays = Math.round((nowDateOnly - baseDateOnly) / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return { value: item.current_update, isChanged: false };

            let additionalUpdate = Math.floor(diffDays / 7);
            const remainingDays = diffDays % 7;

            if (remainingDays > 0) {
                const baseDayIdx = baseDateOnly.getDay();
                const targetDayIdx = CONFIG.WEEK_REVERSE[item.update_day];
                for (let i = 1; i <= remainingDays; i++) {
                    if ((baseDayIdx + i) % 7 === targetDayIdx) {
                        additionalUpdate += 1;
                        break;
                    }
                }
            }

            const predictedValue = item.current_update + additionalUpdate;
            if (item.total_episodes && predictedValue > item.total_episodes) {
                return { value: item.total_episodes, isChanged: item.total_episodes > item.current_update };
            }
            return { value: predictedValue, isChanged: additionalUpdate > 0 };
        }

        async function pullCloud() {
            const url = `https://api.github.com/repos/${CONFIG.REPO.owner}/${CONFIG.REPO.repo}/contents/${CONFIG.REPO.path}`;
            try {
                const r = await fetch(url, { headers: { 'Authorization': `token ${state.token}` } });
                if (r.ok) {
                    const meta = await r.json();
                    const content = JSON.parse(decodeURIComponent(escape(atob(meta.content))));
                    state.data = content.data || [];
                    state.baseTime = content.export_time;
                    state.sha = meta.sha;
                    render();
                    showStatus("已从云端拉取最新数据");
                } else {
                    alert("Token 可能已过期或配置错误");
                    openModal('configModal');
                }
            } catch (e) {
                showStatus("网络连接失败，请检查设置");
            }
        }

        async function pushCloud() {
            if (!state.token) return openModal('configModal');

            const newData = state.data.map(item => {
                const prediction = calculateCurrentUpdate(item);
                return { ...item, current_update: prediction.value };
            });

            showStatus("正在更新并同步到 GitHub...");

            const url = `https://api.github.com/repos/${CONFIG.REPO.owner}/${CONFIG.REPO.repo}/contents/${CONFIG.REPO.path}`;
            const body = {
                message: "Cloud Sync with Persistent Token",
                content: btoa(unescape(encodeURIComponent(JSON.stringify({
                    export_time: new Date().toLocaleString(),
                    data: newData
                }, null, 2)))),
                sha: state.sha
            };

            const r = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${state.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (r.ok) {
                const res = await r.json();
                state.sha = res.content.sha;
                state.data = newData;
                state.baseTime = new Date().toLocaleString();
                render();
                showStatus("云端同步成功，基准日期已重置");
            } else { alert("保存失败，请检查网络或 GitHub 状态"); }
        }

        function render() {
            const container = document.getElementById('overview-container');
            container.innerHTML = '';

            const todayIdx = new Date().getDay();
            const sortedWeek = [];
            for (let i = 0; i < 7; i++) {
                const idx = (todayIdx + i) % 7;
                const name = CONFIG.WEEK_MAP[idx];
                let rel = i === 0 ? "今天" : (i === 1 ? "明天" : (i === 6 ? "昨天" : ""));
                sortedWeek.push({ name, relative: rel });
            }

            sortedWeek.forEach(dayInfo => {
                const group = state.data.filter(e => e.update_day === dayInfo.name);
                if (group.length === 0) return;

                const section = document.createElement('div');
                section.className = `day-group ${dayInfo.relative === "今天" ? 'is-today' : ''}`;
                section.innerHTML = `<h3><span class="day-label">${dayInfo.name}更新</span>${dayInfo.relative ? `<span class="relative-tag">${dayInfo.relative}</span>` : ''}</h3>`;

                const row = document.createElement('div');
                row.className = 'anime-row';

                group.forEach(item => {
                    const idx = state.data.indexOf(item);
                    const prediction = calculateCurrentUpdate(item);
                    const total = item.total_episodes || 0;
                    const progress = total ? (item.my_progress / total * 100) : 0;

                    const card = document.createElement('div');
                    card.className = 'anime-item';
                    card.innerHTML = `
                        <div class="anime-content"><h4><a href="${item.url || '#'}" target="_blank">${item.name}</a></h4></div>
                        <div class="progress-info">
                            更至: <span class="updated-episode-display ${prediction.isChanged ? 'is-predicted' : ''}">${prediction.value}</span><br>
                            我在: <span class="user-episode-display">${item.my_progress}</span> ${total ? `(共${total}集)` : ''}
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, progress)}%"></div></div>
                        <div class="anime-actions">
                            <button class="plus-one-btn" onclick="quickPlus(${idx})">+1</button>
                            <button class="edit-btn" onclick="openEdit(${idx})">改</button>
                            <button class="delete-btn" onclick="delItem(${idx})">删</button>
                        </div>
                    `;
                    row.appendChild(card);
                });
                section.appendChild(row);
                container.appendChild(section);
            });
        }

        function quickPlus(idx) {
            const prediction = calculateCurrentUpdate(state.data[idx]);
            if (state.data[idx].my_progress < prediction.value) {
                state.data[idx].my_progress++;
                render();
            }
        }

        function delItem(idx) {
            if (confirm("删除后需点击同步才生效，确定吗？")) { state.data.splice(idx, 1); render(); }
        }

        function openEdit(idx = null) {
            state.editIdx = idx;
            if (idx !== null) {
                const d = state.data[idx];
                document.getElementById('f_name').value = d.name;
                document.getElementById('f_url').value = d.url || '';
                document.getElementById('f_cur').value = d.current_update;
                document.getElementById('f_my').value = d.my_progress;
                document.getElementById('f_total').value = d.total_episodes || '';
                document.getElementById('f_day').value = d.update_day;
            } else { document.getElementById('animeForm').reset(); }
            openModal('animeModal');
        }

        document.getElementById('animeForm').onsubmit = (e) => {
            e.preventDefault();
            const entry = {
                name: document.getElementById('f_name').value,
                url: document.getElementById('f_url').value,
                current_update: parseInt(document.getElementById('f_cur').value),
                my_progress: parseInt(document.getElementById('f_my').value),
                total_episodes: parseInt(document.getElementById('f_total').value) || null,
                update_day: document.getElementById('f_day').value
            };
            if (state.editIdx !== null) state.data[state.editIdx] = entry;
            else state.data.push(entry);
            render();
            closeModal('animeModal');
        };

        // 修改点：保存到 localStorage
        function saveConfig() {
            const t = document.getElementById('gh_token').value.trim();
            if (t) {
                state.token = t;
                localStorage.setItem('gh_token', t); // 存入本地缓存
                pullCloud();
                closeModal('configModal');
            }
        }

        function showStatus(m) {
            const s = document.getElementById('sync-status');
            s.textContent = m; s.style.display = 'block';
            setTimeout(() => s.style.display = 'none', 3000);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('pushBtn').onclick = () => pushCloud();
        document.getElementById('addAnimeBtn').onclick = () => openEdit();
        document.getElementById('configBtn').onclick = () => openModal('configModal');
    </script>
</body>

</html>
