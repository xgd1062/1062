<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简追番看板 - 动态版</title>
    <style>
        :root {
            --primary-color: #42b983;
            --card-bg-light: #f0f9f4;
            --bg-color: #f8fbf9;
            --column-width: 25%;
        }

        body {
            font-family: -apple-system, "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h2 {
            margin: 25px 0;
            color: var(--primary-color);
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            position: relative;
        }

        .scroll-viewport {
            display: flex;
            width: 100%;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 20px;
            /* 允许原生滚动 */
            -webkit-overflow-scrolling: touch;
        }

        .scroll-viewport::-webkit-scrollbar {
            display: none;
        }

        .schedule-inner {
            display: flex;
            width: calc(var(--column-width) * 7);
            padding: 10px 0;
        }

        .day-column {
            flex: 0 0 var(--column-width);
            padding: 0 8px;
            box-sizing: border-box;
        }

        .column-content {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 15px 8px;
            min-height: 80vh;
            border: 1px solid transparent;
        }

        .today .column-content {
            background: rgba(66, 185, 131, 0.08);
            border: 1.5px dashed var(--primary-color);
        }

        .header {
            text-align: center;
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #888;
        }

        .today .header {
            color: var(--primary-color);
        }

        .card {
            background: var(--card-bg-light);
            border: 1px solid rgba(66, 185, 131, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin: 0 auto 12px auto;
            box-shadow: 0 4px 6px rgba(66, 185, 131, 0.05);
            width: 95%;
            height: 115px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            color: #444;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .card:hover {
            transform: translateY(-3px);
            background: #e1f5eb;
        }

        .card-title {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 11px;
            color: #777;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background: linear-gradient(90deg, #96e6a1 0%, #d4fc79 100%);
        }

        .auto-tag {
            font-size: 9px;
            color: #42b983;
            margin-left: 2px;
        }

        /* 手机端适配：修正滑动体验 */
        @media (max-width: 768px) {
            :root {
                --column-width: 100vw;
            }

            .scroll-viewport {
                scroll-snap-type: x mandatory;
                /* 开启吸附 */
            }

            .day-column {
                scroll-snap-align: center;
                padding: 0 10px;
            }

            .column-content {
                min-height: auto;
                margin-bottom: 30px;
            }

            .app-container {
                cursor: default;
                /* 手机端恢复默认指针 */
            }
        }
    </style>
</head>

<body>

    <h2>🍃 我的追番进度表</h2>

    <div class="app-container" id="dragArea">
        <div class="scroll-viewport" id="viewport">
            <div class="schedule-inner" id="scheduleBoard"></div>
        </div>
    </div>

    <script>
        const weekDays = [
            { label: '周一 / MON', value: '周一', day: 1 },
            { label: '周二 / TUE', value: '周二', day: 2 },
            { label: '周三 / WED', value: '周三', day: 3 },
            { label: '周四 / THU', value: '周四', day: 4 },
            { label: '周五 / FRI', value: '周五', day: 5 },
            { label: '周六 / SAT', value: '周六', day: 6 },
            { label: '周日 / SUN', value: '周日', day: 0 }
        ];

        async function initBoard() {
            try {
                const response = await fetch('01番剧更新信息.json');
                const result = await response.json();
                const animeData = result.data;
                const exportTime = new Date(result.export_time);
                const now = new Date();
                const board = document.getElementById('scheduleBoard');
                const today = now.getDay();

                weekDays.forEach(dayInfo => {
                    const column = document.createElement('div');
                    column.className = `day-column ${dayInfo.day === today ? 'today' : ''}`;
                    let cardsHtml = '';
                    const todayAnimes = animeData.filter(a => a.update_day === dayInfo.value);

                    todayAnimes.forEach(anime => {
                        const isFinished = anime.total_episodes && anime.my_progress >= anime.total_episodes;

                        // 周更逻辑计算：计算间隔周数
                        let addedEpisodes = 0;
                        if (!isFinished) {
                            const msPerDay = 24 * 60 * 60 * 1000;
                            const msPerWeek = 7 * msPerDay;

                            // 找到 export_time 之后第一个更新日的时间戳
                            let firstUpdateAfterExport = new Date(exportTime);
                            const daysToFirstUpdate = (dayInfo.day - exportTime.getDay() + 7) % 7;
                            firstUpdateAfterExport.setDate(exportTime.getDate() + daysToFirstUpdate);
                            firstUpdateAfterExport.setHours(0, 0, 0, 0);

                            if (now >= firstUpdateAfterExport) {
                                // 基础集数：1（代表跨过的第一个更新日）+ 之后经过的完整周数
                                const remainingMs = now - firstUpdateAfterExport;
                                addedEpisodes = 1 + Math.floor(remainingMs / msPerWeek);
                            }
                        }

                        const predictedUpdate = isFinished ? anime.current_update : (anime.current_update + addedEpisodes);
                        const denominator = anime.total_episodes || predictedUpdate;
                        const progressPercent = Math.min((anime.my_progress / denominator) * 100, 100).toFixed(1);

                        cardsHtml += `
                        <a href="${anime.url}" target="_blank" class="card">
                            <div class="card-title">${anime.name}</div>
                            <div>
                                <div class="card-meta">
                                    <span>最新: ${predictedUpdate}${addedEpisodes > 0 && !isFinished ? '<span class="auto-tag">+' + addedEpisodes + '</span>' : ''}</span> 
                                    <span>进度: ${anime.my_progress}/${anime.total_episodes || '??'}</span>
                                </div>
                                <div class="progress-bar"><div class="fill" style="width: ${progressPercent}%"></div></div>
                            </div>
                        </a>`;
                    });

                    column.innerHTML = `<div class="column-content"><div class="header">${dayInfo.label}</div>${cardsHtml}</div>`;
                    board.appendChild(column);

                    if (dayInfo.day === today) {
                        setTimeout(() => {
                            document.getElementById('viewport').scrollLeft = column.offsetLeft;
                        }, 200);
                    }
                });

                setupDrag();
            } catch (err) { console.error(err); }
        }

        function setupDrag() {
            const slider = document.getElementById('viewport');
            // 如果是触屏设备，跳过 JS 拖拽逻辑，使用原生滑动
            if ('ontouchstart' in window) return;

            let isDown = false, startX, scrollLeft;
            slider.style.cursor = 'grab';

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.style.cursor = 'grabbing';
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.style.cursor = 'grab'; });
            slider.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = 'grab'; });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });
        }

        window.onload = initBoard;
    </script>
</body>

</html>
