<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简追番看板 - 移动适配版</title>
    <style>
        :root {
            --primary-color: #42b983;
            --card-bg-light: #f0f9f4;
            --bg-color: #f8fbf9;
            /* 默认 PC 端每页显示 4 列 */
            --column-width: 25%;
        }

        body {
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            height: 100vh;
        }

        h2 {
            margin: 15px 0;
            color: var(--primary-color);
            font-size: 1.2rem;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        /* 核心容器 */
        .app-container {
            width: 100%;
            max-width: 1200px;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 滚动视口：启用捕捉对齐 */
        .scroll-viewport {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory; /* 核心：强制捕捉 */
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-viewport::-webkit-scrollbar {
            display: none;
        }

        .schedule-inner {
            display: flex;
            /* 宽度将通过 JS 或 CSS 根据列数动态确定，这里设为 700% 对应 7 天 */
            width: calc(var(--column-width) * 7);
            height: 100%;
        }

        .day-column {
            flex: 0 0 var(--column-width);
            scroll-snap-align: center; /* 核心：捕捉点在中心 */
            padding: 0 10px;
            box-sizing: border-box;
            height: 100%;
        }

        .column-content {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 15px 12px;
            height: calc(100% - 20px);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* 今日高亮 */
        .today .column-content {
            background: rgba(66, 185, 131, 0.05);
            border: 2px solid var(--primary-color);
        }

        .header {
            text-align: center;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 15px;
            color: #999;
            flex-shrink: 0;
        }

        .today .header {
            color: var(--primary-color);
        }

        /* 卡片设计 */
        .card {
            background: var(--card-bg-light);
            border: 1px solid rgba(66, 185, 131, 0.15);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            color: #444;
            min-height: 100px;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 11px;
            color: #7f8c8d;
            display: flex;
            justify-content: space-between;
            margin: 8px 0 4px 0;
        }

        .progress-bar {
            height: 5px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background: linear-gradient(90deg, #96e6a1 0%, #d4fc79 100%);
        }

        .auto-tag {
            background: var(--primary-color);
            color: white;
            padding: 1px 4px;
            border-radius: 4px;
            font-size: 9px;
            margin-left: 4px;
        }

        /* 移动端适配：关键修改 */
        @media (max-width: 768px) {
            :root {
                --column-width: 100%; /* 一页显示一列 */
            }
            
            h2 { margin: 10px 0; }
            
            .day-column {
                padding: 0 15px; /* 增加手机边缘留白 */
            }

            .column-content {
                padding: 15px 15px;
            }
        }
    </style>
</head>

<body>

    <h2>🍃 追番进度看板</h2>

    <div class="app-container">
        <div class="scroll-viewport" id="viewport">
            <div class="schedule-inner" id="scheduleBoard"></div>
        </div>
    </div>

    <script>
        const weekDays = [
            { label: '周一 / MONDAY', value: '周一', day: 1 },
            { label: '周二 / TUESDAY', value: '周二', day: 2 },
            { label: '周三 / WEDNESDAY', value: '周三', day: 3 },
            { label: '周四 / THURSDAY', value: '周四', day: 4 },
            { label: '周五 / FRIDAY', value: '周五', day: 5 },
            { label: '周六 / SATURDAY', value: '周六', day: 6 },
            { label: '周日 / SUNDAY', value: '周日', day: 0 }
        ];

        async function initBoard() {
            try {
                // 读取本地存储或获取数据
                const response = await fetch('01番剧更新信息.json');
                const result = await response.json();
                const animeData = result.data;
                const exportTime = new Date(result.export_time);

                const now = new Date();
                const diffDays = Math.floor(Math.max(0, now - exportTime) / (1000 * 60 * 60 * 24));

                const board = document.getElementById('scheduleBoard');
                const today = now.getDay();

                weekDays.forEach(dayInfo => {
                    const column = document.createElement('div');
                    column.className = `day-column ${dayInfo.day === today ? 'today' : ''}`;

                    let cardsHtml = '';
                    const todayAnimes = animeData.filter(a => a.update_day === dayInfo.value);

                    todayAnimes.forEach(anime => {
                        const isFinished = anime.total_episodes && anime.my_progress >= anime.total_episodes;
                        const predictedUpdate = isFinished ? anime.current_update : (anime.current_update + diffDays);
                        const denominator = anime.total_episodes || predictedUpdate;
                        const progressPercent = Math.min((anime.my_progress / denominator) * 100, 100).toFixed(1);

                        cardsHtml += `
                        <a href="${anime.url}" target="_blank" class="card">
                            <div class="card-title">${anime.name}</div>
                            <div>
                                <div class="card-meta">
                                    <span>最新: ${predictedUpdate}${diffDays > 0 && !isFinished ? '<span class="auto-tag">+' + diffDays + '</span>' : ''}</span> 
                                    <span>进度: ${anime.my_progress}/${anime.total_episodes || '??'}</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="fill" style="width: ${progressPercent}%"></div>
                                </div>
                            </div>
                        </a>
                    `;
                    });

                    column.innerHTML = `
                    <div class="column-content">
                        <div class="header">${dayInfo.label}</div>
                        ${cardsHtml || '<div style="text-align:center; margin-top:50px; opacity:0.2; font-size:12px;">今日无更新</div>'}
                    </div>
                `;
                    board.appendChild(column);

                    // 初始定位到今天
                    if (dayInfo.day === today) {
                        setTimeout(() => {
                            const viewport = document.getElementById('viewport');
                            viewport.scrollLeft = column.offsetLeft;
                        }, 50);
                    }
                });

            } catch (err) {
                console.error("加载数据失败:", err);
            }
        }

        window.onload = initBoard;
    </script>

</body>

</html>
