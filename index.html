<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗意工具箱 - 精致微缩版</title>
    <style>
        :root {
            --primary: #a78bfa;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --star-color: #fbbf24;
            --empty-bg: rgba(255, 255, 255, 0.02);
            --danger: #f43f5e;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .poem-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            color: transparent;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        #searchInput {
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: white;
            outline: none;
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
        }

        .category-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cat-btn {
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .cat-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .top-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .top-column {
            flex: 1;
            background: var(--empty-bg);
            padding: 12px;
            border-radius: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            min-height: 100px;
        }

        .top-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .section-label {
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 12px;
            transition: all 0.3s ease;
            position: relative;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
            height: 90px;
            overflow: hidden;
        }

        .tool-card:hover:not(.editing-mode) {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .editing-mode {
            border: 1px dashed var(--primary);
            cursor: pointer;
        }

        .tool-card h3 {
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 20px;
            font-weight: 600;
        }

        .tool-card p {
            color: var(--text-dim);
            font-size: 0.75rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .star-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1rem;
            cursor: pointer;
            color: #4b5563;
            z-index: 5;
        }

        .star-btn.active {
            color: var(--star-color);
        }

        .card-tag {
            position: absolute;
            bottom: 0;
            right: 0;
            padding: 1px 6px;
            font-size: 0.6rem;
            background: rgba(167, 139, 250, 0.1);
            color: var(--primary);
            border-top-left-radius: 8px;
        }

        #editorModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 1px solid var(--primary);
            padding: 20px;
            border-radius: 15px;
            z-index: 2000;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        #jsonTextArea {
            width: 100%;
            height: 300px;
            background: #0f172a;
            color: #10b981;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: none;
            outline: none;
        }

        .admin-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(15, 23, 42, 0.9);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .btn-main {
            padding: 6px 12px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-edit {
            background: var(--primary);
            color: white;
        }

        .btn-gh {
            background: #4b5563;
            color: white;
        }

        .btn-sync {
            background: #10b981;
            color: white;
        }

        /* 绿色常驻 */
        .btn-add {
            background: #3b82f6;
            color: white;
            display: none;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .tool-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }

            .top-row {
                flex-direction: column;
            }

            .admin-bar {
                width: 92%;
                justify-content: space-around;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1 class="poem-title">欲善其事，必先利其器</h1>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="检索工具...">
                <div class="category-bar" id="categoryBar"></div>
            </div>
        </header>

        <div id="topSection" class="top-row">
            <div class="top-column">
                <div class="section-label">⭐ 常用</div>
                <div id="favGrid" class="top-grid"></div>
            </div>
            <div class="top-column" id="historySection">
                <div class="section-label">🕒 历史</div>
                <div id="hisGrid" class="top-grid"></div>
            </div>
        </div>

        <div class="section-label">🚀 库 <span id="syncStatus"
                style="font-size:0.6rem; margin-left:10px; opacity:0.4;"></span></div>
        <div id="toolGrid" class="tool-grid"></div>

        <div style="height: 100px;"></div>
    </div>

    <div id="editorModal" class="hidden">
        <h4 style="margin-bottom:12px; color:var(--primary);">数据对象编辑器 (JSON)</h4>
        <textarea id="jsonTextArea"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-main" style="background:#10b981; flex:1;" onclick="applyJsonChange()">应用修改</button>
            <button class="btn-main" style="background:#f43f5e; width:60px;" onclick="deleteCurrent()">删除</button>
            <button class="btn-main" style="background:#4b5563; width:60px;" onclick="closeEditor()">取消</button>
        </div>
    </div>

    <div id="configModal" class="hidden"
        style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#1e293b; border:1px solid var(--primary); padding:20px; border-radius:15px; z-index:2000;">
        <p style="margin-bottom:10px; font-size:0.8rem;">GitHub Token & Repo</p>
        <input id="ghToken" type="password" placeholder="Token"
            style="width:100%; margin-bottom:10px; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white; padding:5px;">
        <input id="ghRepo" placeholder="xgd1062/1062"
            style="width:100%; margin-bottom:15px; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white; padding:5px;">
        <button class="btn-main" style="background:var(--primary); width:100%;" onclick="saveConfig()">保存配置</button>
    </div>

    <div class="admin-bar">
        <button class="btn-main btn-gh" onclick="toggleConfig()">⚙️ 配置</button>
        <button id="editBtn" class="btn-main btn-edit" onclick="toggleEditMode()">🛠️ 管理</button>
        <button id="addBtn" class="btn-main btn-add" onclick="addNewTool()">+ 新增</button>
        <button id="syncBtn" class="btn-main btn-sync" onclick="saveAllData()">💾 同步云端</button>
    </div>

    <script>
        let allTools = [];
        let isEditing = false;
        let currentCat = '全部';
        let editingId = null;
        const STORAGE_KEY = 'poet_tools_v12';
        const FILE_NAME = 'tools.json';

        document.addEventListener('DOMContentLoaded', async () => {
            const local = localStorage.getItem(STORAGE_KEY);
            if (local) { allTools = JSON.parse(local); renderAll(); initCategories(); }
            await fetchFromGitHub();
            renderAll();
            initCategories();
            document.getElementById('searchInput').oninput = () => renderAll();
        });

        // --- 云同步 ---
        async function fetchFromGitHub() {
            const token = localStorage.getItem('gh_token'), repo = localStorage.getItem('gh_repo');
            if (!token || !repo) return;
            document.getElementById('syncStatus').innerText = "正在同步...";
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${FILE_NAME}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    allTools = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(allTools));
                    document.getElementById('syncStatus').innerText = "云端就绪";
                }
            } catch (e) { document.getElementById('syncStatus').innerText = "本地模式"; }
        }

        async function saveAllData() {
            const token = localStorage.getItem('gh_token'), repo = localStorage.getItem('gh_repo');
            if (!token) return alert("请先配置 Token");
            const btn = document.getElementById('syncBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ 同步中...";

            try {
                let sha = "";
                const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/${FILE_NAME}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (getRes.ok) sha = (await getRes.json()).sha;

                const content = btoa(unescape(encodeURIComponent(JSON.stringify(allTools, null, 2))));
                const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/${FILE_NAME}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update Tools", content, sha })
                });
                if (putRes.ok) {
                    btn.innerHTML = "✨ 同步成功";
                    setTimeout(() => btn.innerHTML = originalText, 1500);
                }
            } catch (e) {
                alert("同步失败");
                btn.innerHTML = originalText;
            }
        }

        // --- 渲染逻辑 ---
        function renderGrid(containerId, data) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = data.length ? '' : '<div class="empty-hint" style="grid-column:span 2; text-align:center; font-size:0.7rem; opacity:0.3; margin-top:20px;">无数据</div>';

            data.forEach((tool) => {
                const card = document.createElement(isEditing ? 'div' : 'a');
                card.className = `tool-card ${isEditing ? 'editing-mode' : ''}`;
                if (!isEditing) {
                    card.href = tool.link;
                    if (tool.link.startsWith('http')) card.target = "_blank";
                    card.onclick = () => recordHistory(tool.id);
                } else {
                    card.onclick = () => openEditor(tool.id);
                }

                card.innerHTML = `
                    ${!isEditing ? `<div class="star-btn ${tool.fav ? 'active' : ''}" onclick="event.preventDefault();toggleFav(${tool.id})">★</div>` : ''}
                    <h3 title="${tool.title}">${tool.icon || '🛠️'} ${tool.title}</h3>
                    <p>${tool.desc}</p>
                    <div class="card-tag">${tool.category}</div>
                `;
                grid.appendChild(card);
            });
        }

        // --- JSON 编辑器逻辑 ---
        function openEditor(id) {
            editingId = id;
            const tool = allTools.find(t => t.id === id);
            document.getElementById('jsonTextArea').value = JSON.stringify(tool, null, 4);
            document.getElementById('editorModal').classList.remove('hidden');
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.add('hidden');
            editingId = null;
        }

        function applyJsonChange() {
            try {
                const updated = JSON.parse(document.getElementById('jsonTextArea').value);
                const idx = allTools.findIndex(t => t.id === editingId);
                allTools[idx] = updated;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allTools));
                renderAll();
                closeEditor();
            } catch (e) { alert("JSON 格式错误，请检查"); }
        }

        function deleteCurrent() {
            if (confirm("确定删除此项？")) {
                allTools = allTools.filter(t => t.id !== editingId);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allTools));
                renderAll();
                closeEditor();
            }
        }

        function addNewTool() {
            const newTool = {
                id: Date.now(),
                title: "新工具",
                icon: "🚀",
                link: "#",
                category: currentCat === '全部' ? "默认" : currentCat,
                desc: "请在此输入描述",
                fav: false
            };
            allTools.unshift(newTool);
            renderAll();
            openEditor(newTool.id);
        }

        // --- 辅助功能 ---
        function toggleEditMode() {
            isEditing = !isEditing;
            document.getElementById('editBtn').innerText = isEditing ? '✅ 退出' : '🛠️ 管理';
            document.getElementById('addBtn').style.display = isEditing ? 'flex' : 'none';
            renderAll();
        }

        async function toggleFav(id) {
            const t = allTools.find(x => x.id === id);
            if (t) { t.fav = !t.fav; renderAll(); localStorage.setItem(STORAGE_KEY, JSON.stringify(allTools)); }
        }

        function recordHistory(id) {
            let his = JSON.parse(localStorage.getItem('tool_his_v11') || '[]');
            his = [id, ...his.filter(x => x !== id)].slice(0, 2);
            localStorage.setItem('tool_his_v11', JSON.stringify(his));
        }

        function initCategories() {
            const cats = [...new Set(allTools.map(t => t.category))].filter(Boolean);
            document.getElementById('categoryBar').innerHTML = ['全部', ...cats].map(c =>
                `<button class="cat-btn ${c === currentCat ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>`
            ).join('');
        }

        function filterCat(cat) { currentCat = cat; renderAll(); initCategories(); }

        function renderAll() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTools.filter(t => (currentCat === '全部' || t.category === currentCat) && (t.title.toLowerCase().includes(filter) || t.desc.toLowerCase().includes(filter)));
            renderGrid('toolGrid', filtered);

            const favs = allTools.filter(t => t.fav).slice(0, 2);
            const hisIds = JSON.parse(localStorage.getItem('tool_his_v11') || '[]');
            const hisTools = hisIds.map(id => allTools.find(t => t.id === id)).filter(Boolean).slice(0, 2);
            renderGrid('favGrid', favs);
            renderGrid('hisGrid', hisTools);

            document.getElementById('topSection').style.display = (isEditing || filter) ? 'none' : 'flex';
        }

        function toggleConfig() { document.getElementById('configModal').classList.toggle('hidden'); }
        function saveConfig() {
            localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim());
            location.reload();
        }
    </script>
</body>

</html>
